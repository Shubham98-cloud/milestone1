services:
  - type: web
    name: zomato-ai-recommender
    env: python
    buildCommand: "pip install -r requirements.txt && python Phase1_DataIngestion/data_loader.py"
    startCommand: "uvicorn Phase2_BackendAPI.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
